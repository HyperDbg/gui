name: rust-driver-ci

on:
  push:
    branches:
      - master
      - main
      - dev
    paths:
      - 'rust-driver/**'
      - '.github/workflows/rust-driver-ci.yml'
  pull_request:
    branches:
      - master
      - main
      - dev
    paths:
      - 'rust-driver/**'
      - '.github/workflows/rust-driver-ci.yml'

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  check-and-build:
    name: Check and Build Rust Driver
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup LLVM
        uses: KyleMayes/install-llvm-action@v1
        with:
          version: '17'
          directory: 'C:\Program Files\LLVM'
          cached: 'false'

      - name: Setup MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-ld
            mingw-w64-x86_64-make
            mingw-w64-x86_64-binutils
            git
            base-devel

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: rust-driver/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('rust-driver/**/Cargo.lock') }}

      - name: Configure Cargo
        run: |
          if not exist "%USERPROFILE%\.cargo" mkdir "%USERPROFILE%\.cargo"
          echo [target.x86_64-pc-windows-gnu] > "%USERPROFILE%\.cargo\config.toml"
          echo linker = "x86_64-w64-mingw32-gcc" >> "%USERPROFILE%\.cargo\config.toml"
          echo ar = "x86_64-w64-mingw32-gcc-ar" >> "%USERPROFILE%\.cargo\config.toml"
          echo. >> "%USERPROFILE%\.cargo\config.toml"
          echo [build] >> "%USERPROFILE%\.cargo\config.toml"
          echo target = "x86_64-pc-windows-gnu" >> "%USERPROFILE%\.cargo\config.toml"

      - name: Rust version
        run: |
          rustc --version
          cargo --version

      - name: Check formatting
        working-directory: rust-driver
        run: cargo fmt --all -- --check

      - name: Run Clippy
        working-directory: rust-driver
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        working-directory: rust-driver
        run: cargo test --all-targets --all-features

      - name: Build driver (Release)
        working-directory: rust-driver
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Build driver (Debug)
        working-directory: rust-driver
        run: cargo build --target x86_64-pc-windows-gnu

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-driver-artifacts
          path: |
            rust-driver/target/x86_64-pc-windows-gnu/release/*.sys
            rust-driver/target/x86_64-pc-windows-gnu/release/*.dll
            rust-driver/target/x86_64-pc-windows-gnu/debug/*.sys
            rust-driver/target/x86_64-pc-windows-gnu/debug/*.dll

  verify-wsk:
    name: Verify WSK Module
    runs-on: windows-latest
    needs: check-and-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: rust-driver/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('rust-driver/**/Cargo.lock') }}

      - name: Build WSK module
        working-directory: rust-driver/wsk
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Verify WSK build
        run: |
          if exist "rust-driver\target\x86_64-pc-windows-gnu\release\wsk.dll" (
            echo WSK module built successfully
          ) else (
            echo ERROR: WSK module not found
            exit 1
          )

  verify-hyperkd:
    name: Verify HyperKD Module
    runs-on: windows-latest
    needs: check-and-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: rust-driver/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('rust-driver/**/Cargo.lock') }}

      - name: Build HyperKD module
        working-directory: rust-driver/hyperkd
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Verify HyperKD build
        run: |
          if exist "rust-driver\target\x86_64-pc-windows-gnu\release\hyperkd.sys" (
            echo HyperKD module built successfully
          ) else (
            echo ERROR: HyperKD module not found
            exit 1
          )

  verify-hyperhv:
    name: Verify HyperHV Module
    runs-on: windows-latest
    needs: check-and-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: rust-driver/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('rust-driver/**/Cargo.lock') }}

      - name: Build HyperHV module
        working-directory: rust-driver/hyperhv
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Verify HyperHV build
        run: |
          if exist "rust-driver\target\x86_64-pc-windows-gnu\release\hyperhv.sys" (
            echo HyperHV module built successfully
          ) else (
            echo ERROR: HyperHV module not found
            exit 1
          )

  verify-protocol:
    name: Verify Protocol Module
    runs-on: windows-latest
    needs: check-and-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: rust-driver/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('rust-driver/**/Cargo.lock') }}

      - name: Build Protocol module
        working-directory: rust-driver/protocol
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Verify Protocol build
        run: |
          if exist "rust-driver\target\x86_64-pc-windows-gnu\release\protocol.dll" (
            echo Protocol module built successfully
          ) else (
            echo ERROR: Protocol module not found
            exit 1
          )

  verify-walker-integration:
    name: Verify Walker Integration
    runs-on: windows-latest
    needs: check-and-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.21'

      - name: Go mod tidy
        working-directory: go-communicator
        run: go mod tidy

      - name: Build go-communicator
        working-directory: go-communicator
        run: go build -o communicator.exe

      - name: Verify walker integration
        run: |
          if exist "go-communicator\communicator.exe" (
            echo go-communicator built successfully
            echo Walker integration verified
          ) else (
            echo ERROR: go-communicator not found
            exit 1
          )

      - name: Upload go-communicator artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-communicator
          path: go-communicator/communicator.exe
